name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least-privilege default: every job only reads the checkout. No job needs
# write scope, so cap the GITHUB_TOKEN even on push/same-repo runs.
permissions:
  contents: read

jobs:
  rust:
    name: Rust port (fmt, clippy, parity)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/rust
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt
      - name: Cache cargo
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ports/rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('ports/rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Format check
        run: cargo fmt --all --check
      - name: Clippy (warnings as errors)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Build
        run: cargo build --workspace --release
      - name: Test (parity + units against committed gold baselines)
        run: cargo test --workspace --release

  python:
    name: Python port (baseline parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install the package
        run: pip install -e ports/python
      - name: Run parity test suite
        run: python -m unittest discover -s tests
      - name: Validate against committed gold baselines
        run: |
          python -m lorentzian_classification validate-fixtures \
            --fixture-dir tests/parity/baselines \
            --manifest tests/parity/baselines/baselines_manifest.json

  lean:
    name: Lean port (build, property tests, parity)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ports/lean
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install elan (toolchain pinned by ports/lean/lean-toolchain)
        run: |
          curl https://elan.lean-lang.org/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Cache Lean toolchain and build artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.elan/toolchains
            ports/lean/.lake
          key: ${{ runner.os }}-lean-${{ hashFiles('ports/lean/lean-toolchain', 'ports/lean/lakefile.lean') }}
          restore-keys: |
            ${{ runner.os }}-lean-
      - name: Build (library + CLI)
        run: lake build
      - name: Property tests (theorem-named)
        run: lake test
      - name: Parity against committed gold baselines
        run: |
          BIN=.lake/build/bin/lorentzian-classification
          "$BIN" parity ../../tests/parity/baselines/pine_oanda_eurusd_1d_full_history.csv --include-full-history
          "$BIN" parity ../../tests/parity/baselines/pine_tastyfx_eurusd_1d_full_history.csv --include-full-history
          "$BIN" parity ../../tests/parity/baselines/pine_coinbase_btcusd_1d_limited_history.csv
          "$BIN" parity ../../tests/parity/baselines/pine_btcusd_h1_trimmed_limited_history.csv

  cross-port:
    name: Cross-port parity (Rust == Python == Lean)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal
      - name: Install elan (toolchain pinned by ports/lean/lean-toolchain)
        run: |
          curl https://elan.lean-lang.org/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - name: Cache Lean toolchain and build artifacts
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.elan/toolchains
            ports/lean/.lake
          key: ${{ runner.os }}-lean-${{ hashFiles('ports/lean/lean-toolchain', 'ports/lean/lakefile.lean') }}
          restore-keys: |
            ${{ runner.os }}-lean-
      - name: Install the Python package
        run: pip install -e ports/python
      - name: Diff Rust, Python, and Lean outputs across the full schema
        run: tests/parity/cross_port_parity.sh
